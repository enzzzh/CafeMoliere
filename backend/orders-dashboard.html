<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Molière — Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="style.css">
    </link>
</head>

<body>

    <div class="dash-header">
        <div class="dash-title">Café <em>Molière</em> — Dashboard</div>
        <div class="header-right">
            <span class="conn-badge off" id="conn-badge">● Connecting</span>
            <div class="live-dot"></div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat">
            <div class="stat-num" id="sn">0</div>
            <div class="stat-label">New</div>
        </div>
        <div class="stat">
            <div class="stat-num" id="sp">0</div>
            <div class="stat-label">Preparing</div>
        </div>
        <div class="stat">
            <div class="stat-num" id="sr">0</div>
            <div class="stat-label">Ready</div>
        </div>
    </div>

    <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab('orders',this)">🗂 Orders <span class="tab-count"
                id="tc-orders">0</span></button>
        <button class="tab-btn" onclick="switchTab('history',this)">📋 History <span class="tab-count"
                id="tc-history">0</span></button>
    </div>

    <!-- ORDERS TAB -->
    <div class="tab-panel active" id="tab-orders">
        <div>
            <div class="col-label new">🆕 New <div class="col-badge" id="bn">0</div>
            </div>
            <div id="col-new"></div>
        </div>
        <div>
            <div class="col-label prep">🍳 Preparing <div class="col-badge" id="bp">0</div>
            </div>
            <div id="col-prep"></div>
        </div>
        <div>
            <div class="col-label ready">✅ Ready <div class="col-badge" id="br">0</div>
            </div>
            <div id="col-ready"></div>
        </div>
    </div>

    <!-- HISTORY TAB -->
    <div class="history-panel" id="tab-history">
        <div id="history-content"></div>
    </div>

    <script type="module" src="script.js">
    </script>
</body>

</html>
